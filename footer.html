<script>
  // Set the current year in all year elements
  (function() {
    const year = new Date().getFullYear();
    // Set in footer
    const footerYear = document.querySelector('#global-footer .year-footer');
    if (footerYear) {
      footerYear.textContent = year;
    }
    // Also set in any element with id="year" (for compatibility)
    const yearElement = document.getElementById('year');
    if (yearElement) {
      yearElement.textContent = year;
    }
  })();
</script>
